<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#0a0a0a"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="description" content="Premium shift production tracker"/>
  <title>Shift Notes</title>
  <link rel="manifest" href="manifest.webmanifest"/>
  <link rel="stylesheet" href="styles.css"/>
  <link rel="apple-touch-icon" href="icons/icon-192.png"/>
</head>
<body>

<!-- ═══════════════════════════════════════════ TOP BAR -->
<header class="topbar" id="topbar">
  <div class="topbar-inner">
    <div class="topbar-left">
      <button class="topbar-menu" id="menuBtn" aria-label="Menu">
        <span class="menu-line"></span>
        <span class="menu-line"></span>
        <span class="menu-line short"></span>
      </button>
      <div class="topbar-brand">
        <span class="brand-dot"></span>
        <span class="brand-name">Shift Notes</span>
      </div>
    </div>
    <div class="topbar-right">
      <span class="topbar-date" id="shiftDate"></span>
      <button class="topbar-action" id="exportBtn" aria-label="Export CSV" title="Export CSV">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      </button>
      <button class="topbar-action danger" id="clearBtn" aria-label="Clear shift" title="Clear shift">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
      </button>
    </div>
  </div>
  <div class="topbar-progress" id="topbarProgress"></div>
</header>

<!-- ═══════════════════════════════════════════ RATE HERO -->
<section class="rate-hero">
  <div class="rate-hero-inner">
    <div class="rate-kpi primary-kpi">
      <span class="kpi-label">Current Rate</span>
      <span class="kpi-value" id="currentRate">—</span>
      <span class="kpi-unit">t/h</span>
    </div>
    <div class="rate-divider-v"></div>
    <div class="rate-kpi">
      <span class="kpi-label">Avg Rate</span>
      <span class="kpi-value secondary" id="avgRate">—</span>
      <span class="kpi-unit">t/h</span>
    </div>
    <div class="rate-divider-v"></div>
    <div class="rate-kpi">
      <span class="kpi-label">Entries</span>
      <span class="kpi-value secondary" id="entryCount">0</span>
      <span class="kpi-unit">logs</span>
    </div>
  </div>
  <div class="hero-status-bar">
    <span id="offlinePill" class="status-pill offline hidden">
      <span class="pulse-dot"></span>Offline
    </span>
    <span id="shiftDuration" class="status-pill muted"></span>
  </div>
</section>

<!-- ═══════════════════════════════════════════ CHART -->
<section class="chart-card" id="chartSection" style="display:none">
  <div class="chart-card-header">
    <span class="section-label">Rate Trend</span>
    <span class="chart-range" id="chartRange"></span>
  </div>
  <div class="chart-wrap">
    <canvas id="rateChart" aria-label="Rate trend chart"></canvas>
  </div>
</section>

<!-- ═══════════════════════════════════════════ ENTRY FORM -->
<section class="form-card">
  <div class="form-card-header">
    <span class="section-label">Log Entry</span>
    <button class="form-now-btn" id="nowBtn" type="button">Now</button>
  </div>
  <div class="form-fields">
    <div class="field-group">
      <label class="field-label" for="timeInput">Time</label>
      <input class="field-input" type="time" id="timeInput" autocomplete="off"/>
    </div>
    <div class="field-group">
      <label class="field-label" for="rateInput">Rate <span class="field-unit">t/h</span></label>
      <input class="field-input" type="number" id="rateInput" placeholder="1096.2" step="0.1" min="0" inputmode="decimal"/>
    </div>
  </div>
  <div class="field-group full">
    <label class="field-label" for="eventInput">Event / Note</label>
    <input class="field-input" type="text" id="eventInput"
      placeholder="B102 down, rate drop, hexane truck…"
      autocomplete="off" autocorrect="off" spellcheck="false"/>
  </div>
  <button class="add-btn" id="addBtn" type="button">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    Add Entry
  </button>
</section>

<!-- ═══════════════════════════════════════════ QUICK TAGS -->
<div class="qtags-scroll">
  <div class="qtags" id="quickTags">
    <button class="qtag" data-tag="Rate drop">↘ Rate drop</button>
    <button class="qtag" data-tag="Equipment down">⚠ Equip down</button>
    <button class="qtag" data-tag="Equipment cleared">✓ Cleared</button>
    <button class="qtag" data-tag="Belt issue">⚙ Belt issue</button>
    <button class="qtag" data-tag="M.O. added">+ M.O. added</button>
    <button class="qtag" data-tag="Reclaim meal start">▶ Reclaim start</button>
    <button class="qtag" data-tag="Reclaim meal end">■ Reclaim end</button>
    <button class="qtag" data-tag="Hexane truck">⛽ Hexane truck</button>
    <button class="qtag" data-tag="Back up">↑ Back up</button>
    <button class="qtag" data-tag="Shutdown">■ Shutdown</button>
  </div>
</div>

<!-- ═══════════════════════════════════════════ LOG TABLE -->
<section class="log-section">
  <div class="log-header">
    <span class="section-label">Shift Log</span>
    <span class="log-meta" id="logMeta"></span>
  </div>

  <div class="empty-state" id="emptyState">
    <div class="empty-glyph">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" opacity="0.35"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
    </div>
    <p class="empty-msg">No entries yet.<br/>Log your first shift event above.</p>
  </div>

  <div class="log-table-wrap" id="tableWrap">
    <table class="log-table" id="logTable">
      <thead>
        <tr>
          <th>Time</th>
          <th>Rate</th>
          <th>Event / Note</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="logBody"></tbody>
    </table>
  </div>
</section>

<!-- ═══════════════════════════════════════════ MODAL -->
<div class="modal-backdrop" id="modalBackdrop" role="dialog" aria-modal="true">
  <div class="modal">
    <p class="modal-msg" id="modalMsg"></p>
    <div class="modal-actions">
      <button class="modal-btn cancel" id="modalCancel">Cancel</button>
      <button class="modal-btn confirm" id="modalConfirm">Confirm</button>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════ TOAST -->
<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script src="app.js"></script>
</body>
</html>
